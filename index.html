<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hope Florin</title>
    <link rel="stylesheet" href="home.css">
</head>

<body>

<div class="container">

    <aside class="sidebar">

        <h1>Hope Florin</h1>

        <nav>
            <a href="contact.html">Contact</a>
            <a href="about.html">About</a>
            <a href="cv.html">CV</a>
        </nav>

        <div class="work-list">

            <p class="work active" data-img="fig1.JPG">Work One</p>
            <p class="work" data-img="fig2.JPG">Work Two</p>
            <p class="work" data-img="fig3.JPG">Work Three</p>
            <p class="work" data-img="fig4.JPG">Work Four</p>
            <p class="work" data-img="fig5.JPG">Work Five</p>

        </div>

    </aside>

    <main class="content">
        <img id="main-image" src="./fig1.JPG">
    </main>

</div>

<script>
const works = document.querySelectorAll(".work");
const image = document.getElementById("main-image");

works.forEach(item => {
    item.addEventListener("click", () => {

        // change image
        image.src = item.dataset.img;

        // update active state
        works.forEach(w => w.classList.remove("active"));
        item.classList.add("active");

    });
});
</script>

</body>
</html>
