<!DOCTYPE html>
<html lang="en">
<head>

    <title>Hope Florin</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            color: #111;
            background: #fff;

        header {
            display: flex;
            justify-content: space-between;
            padding: 20px 30px;
        }

        h1 {
            font-size: 16px;
            font-weight: normal;
            margin: 0;
        }

        nav a {
            margin-left: 20px;

        }

        main {

        }

        .placeholder-image {

            height: auto;

    <header>
        <h1>Hope Florin</h1>
        <nav>
            <a href="#">Home</a>

    <main>
